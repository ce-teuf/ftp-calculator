name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/dashboard/package-lock.json

      - name: Build Svelte frontend
        working-directory: app/dashboard
        run: |
          npm ci
          npm run build

      - name: Build Rust binaries (Windows)
        run: |
          cargo build --release -p ftp-backend
          cargo build --release -p ftp-tray
          cargo build --release -p ftp-installer-helper

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows installer (slim)
        working-directory: installer/windows
        run: iscc setup.iss

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/FtpSimulator-*-windows-x64.exe

  build-macos:
    name: Build macOS app bundle
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/dashboard/package-lock.json

      - name: Build Svelte frontend
        working-directory: app/dashboard
        run: |
          npm ci
          npm run build

      - name: Build Rust binaries (macOS arm64)
        run: |
          cargo build --release --target aarch64-apple-darwin -p ftp-backend
          cargo build --release --target aarch64-apple-darwin -p ftp-tray
          cargo build --release --target aarch64-apple-darwin -p ftp-installer-helper

      - name: Build macOS app bundle + DMG
        working-directory: installer/macos
        run: bash bundle.sh

      - name: Upload macOS DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/FtpSimulator-*.dmg

  build-linux:
    name: Build Debian package
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    steps:
      - name: Install system dependencies
        run: |
          apt-get update -y
          apt-get install -y curl git build-essential pkg-config dpkg-dev nodejs npm

      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/dashboard/package-lock.json

      - name: Build Svelte frontend
        working-directory: app/dashboard
        run: |
          npm ci
          npm run build

      - name: Build Rust binaries (Linux)
        run: |
          cargo build --release -p ftp-backend
          cargo build --release -p ftp-installer-helper

      - name: Build .deb package
        run: bash installer/build-deb.sh

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@v4
        with:
          name: debian-package
          path: dist/ftp-simulator_*.deb

  upload-ftp:
    name: Upload to FTP server + GitHub Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Build latest.json and upload to FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER:   ${{ secrets.FTP_USER }}
          FTP_PASS:   ${{ secrets.FTP_PASS }}
        run: |
          apt-get install -y lftp

          WIN_FILE=$(ls artifacts/windows-installer/*.exe 2>/dev/null | head -1)
          MAC_FILE=$(ls artifacts/macos-dmg/*.dmg         2>/dev/null | head -1)
          DEB_FILE=$(ls artifacts/debian-package/*.deb    2>/dev/null | head -1)
          WIN_SHA=$(sha256sum "$WIN_FILE" 2>/dev/null | awk '{print $1}' || echo "")
          MAC_SHA=$(sha256sum "$MAC_FILE" 2>/dev/null | awk '{print $1}' || echo "")
          DEB_SHA=$(sha256sum "$DEB_FILE" 2>/dev/null | awk '{print $1}' || echo "")

          cat > artifacts/latest.json << LATESTEOF
          {
            "version": "$VERSION",
            "published_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "windows":   { "url": "releases/FtpSimulator-${VERSION}-windows-x64.exe", "sha256": "$WIN_SHA" },
            "macos":     { "url": "releases/FtpSimulator-${VERSION}-macos.dmg",        "sha256": "$MAC_SHA" },
            "linux_deb": { "url": "releases/ftp-simulator_${VERSION}_amd64.deb",       "sha256": "$DEB_SHA" }
          }
          LATESTEOF

          lftp -u "$FTP_USER,$FTP_PASS" "$FTP_SERVER" <<LFTP
            set ftp:ssl-allow true
            set ssl:verify-certificate false
            mkdir -p /ftp-simulator/releases
            put "$WIN_FILE" -o /ftp-simulator/releases/FtpSimulator-${VERSION}-windows-x64.exe || true
            put "$MAC_FILE" -o /ftp-simulator/releases/FtpSimulator-${VERSION}-macos.dmg       || true
            put "$DEB_FILE" -o /ftp-simulator/releases/ftp-simulator_${VERSION}_amd64.deb      || true
            put artifacts/latest.json -o /ftp-simulator/releases/latest.json
            bye
          LFTP

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-installer/*.exe
            artifacts/macos-dmg/*.dmg
            artifacts/debian-package/*.deb
          generate_release_notes: true
