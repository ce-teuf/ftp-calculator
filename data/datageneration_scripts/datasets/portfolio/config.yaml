global:
  start: "01-2020"
  end: "12-2024"

amortization:
  output: "amortization_matrix.csv"
  periods:
    - maturity: 60
      curvature: 1.5
      curvature_std: 0.2
    - start_period: "01-2022"
      maturity: 30
      curvature: 2.0
      curvature_std: 0.1

outstanding:
  output: "outstanding_balance.csv"
  trend:
    type: "linear"
    start_value: 1000.0
    end_value: 5000.0
  noise:
    type: "absolute"
    std: 50.0
  random_seed: 42