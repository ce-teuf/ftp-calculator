# FTP Simulator — PostgreSQL de production (Docker).
# Ce fichier est installé dans /etc/ftp-simulator/ par le paquet Debian
# et géré par le service systemd ftp-simulator-db.service.
#
# Le mot de passe est lu depuis /etc/ftp-simulator/db_password
# (généré aléatoirement à l'installation si absent).

services:
  db:
    image: postgres:17
    container_name: ftp-simulator-db
    environment:
      POSTGRES_DB:            ftp_simulator
      POSTGRES_USER:          ftp_simulator
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ftp_simulator -d ftp_simulator"]
      interval: 10s
      timeout: 5s
      retries: 10

secrets:
  db_password:
    file: /etc/ftp-simulator/db_password

volumes:
  pgdata:
    name: ftp-simulator-pgdata
